services:
  app:
    image: ghcr.io/ryan-prayoga/kas-badminton/v2:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    # host networking - DATABASE_URL prod nunjuk ke localhost/127.0.0.1 (postgres di host
    # yang sama kayak v1), container perlu network host biar "localhost" nunjuk ke host asli
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_PIN=${ADMIN_PIN:-}
      - NODE_ENV=production
      - PORT=${PORT:-8200}
    volumes:
      - ./data:/app/data
