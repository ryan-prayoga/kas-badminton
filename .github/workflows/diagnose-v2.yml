name: Diagnose kas-badminton v2 (read-only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fix caddy config (restore port 8200) & verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            echo "=== before ==="
            sudo cat /etc/caddy/sites/kok-badminton.caddy

            echo "=== restore .bak-8200 (config port 8200 yang bener) ==="
            sudo cp /etc/caddy/sites/kok-badminton.caddy /etc/caddy/sites/kok-badminton.caddy.bak-8201-wrong
            sudo cp /etc/caddy/sites/kok-badminton.caddy.bak-8200 /etc/caddy/sites/kok-badminton.caddy

            echo "=== after ==="
            sudo cat /etc/caddy/sites/kok-badminton.caddy

            echo "=== validate & reload caddy ==="
            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            sleep 2

            echo "=== curl via domain publik ==="
            curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://kok.ryanprayoga.dev/api/health
            curl -sS https://kok.ryanprayoga.dev/api/health
