name: Diagnose kas-badminton v2 (read-only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Read-only checks on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          port: 22
          script: |
            echo "=== caddy config path ==="
            systemctl show caddy -p FragmentPath -p ExecStart 2>/dev/null || true
            cat /etc/systemd/system/caddy.service 2>/dev/null || true

            echo "=== find Caddyfile ==="
            sudo find /etc/caddy -type f 2>/dev/null || true

            echo "=== grep kok across caddy config ==="
            sudo grep -rl "kok" /etc/caddy/ 2>/dev/null || true
            for f in $(sudo grep -rl "kok" /etc/caddy/ 2>/dev/null); do
              echo "--- $f ---"
              sudo cat "$f"
            done

            echo "=== caddy adapt/validate ==="
            sudo caddy validate --config /etc/caddy/Caddyfile 2>&1 || true

            echo "=== journalctl caddy tail (last 5 min) ==="
            sudo journalctl -u caddy --since "-15 min" --no-pager 2>/dev/null | tail -100 || true
