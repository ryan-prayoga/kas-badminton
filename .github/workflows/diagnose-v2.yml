name: Diagnose kas-badminton v2 (read-only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Read-only checks on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          port: 22
          script: |
            echo "=== docker ps -a (v2 related) ==="
            docker ps -a --filter "name=v2-app" || true

            echo "=== docker compose ps ==="
            cd /home/ubuntu/projects/kok-badminton-v2/v2 2>/dev/null && docker compose ps || true

            echo "=== docker compose logs (tail 100) ==="
            cd /home/ubuntu/projects/kok-badminton-v2/v2 2>/dev/null && docker compose logs --no-color --tail=100 || true

            echo "=== curl localhost:8200/api/health ==="
            curl -v http://127.0.0.1:8200/api/health 2>&1 || true

            echo "=== pm2 list (kok only) ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="/usr/bin:$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            pm2 list | grep -i kok || true

            echo "=== nginx sites (grep kok) ==="
            sudo grep -rl "kok" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null || true
            for f in $(sudo grep -rl "kok" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null); do
              echo "--- $f ---"
              sudo cat "$f"
            done

            echo "=== nginx error log (tail 50) ==="
            sudo tail -50 /var/log/nginx/error.log 2>/dev/null || true

            echo "=== nginx -t ==="
            sudo nginx -t 2>&1 || true
