name: Deploy kas-badminton v2 (cutover)

on:
  push:
    branches: [main]
    paths:
      - "v2/**"
      - ".github/workflows/deploy-v2.yml"
  workflow_dispatch:

concurrency:
  group: kas-badminton-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy v2 to server (docker) & retire v1 (pm2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="/usr/bin:$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"

            V1_DIR="/home/ubuntu/projects/kok-badminton"
            PROJECT_DIR="/home/ubuntu/projects/kok-badminton-v2"
            REPO_URL="https://github.com/ryan-prayoga/kas-badminton.git"
            BRANCH="${{ github.ref_name }}"

            # v2 pake DB prod yang sama kayak v1 - ambil DATABASE_URL dari .env v1, jangan simpan ulang di tempat lain
            if [ ! -f "$V1_DIR/.env" ]; then
              echo "$V1_DIR/.env gak ketemu, gak bisa ambil DATABASE_URL" >&2
              exit 1
            fi
            DATABASE_URL="$(grep -E '^DATABASE_URL=' "$V1_DIR/.env" | head -1 | cut -d '=' -f2- | tr -d '"')"
            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL kosong di $V1_DIR/.env" >&2
              exit 1
            fi
            export DATABASE_URL

            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            if [ ! -d ".git" ]; then
              git init -b "$BRANCH"
              git remote add origin "$REPO_URL"
            fi

            git fetch origin
            git checkout -f "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd -e v2/data -e v2/.env

            cd v2
            printf 'DATABASE_URL=%s\nPORT=8200\n' "$DATABASE_URL" > .env

            # bersihin sisa container lama (mis. dari attempt yang gagal/crash-loop)
            docker compose down || true

            docker compose build

            # tandai skema existing (dari v1) sebagai udah "applied" biar migrate deploy
            # gak nabrak CREATE TABLE ke tabel yang udah ada isinya. aman diulang - kalau
            # udah pernah di-resolve, prisma exit non-zero, ditelan || true.
            docker compose run --rm --entrypoint "" app \
              npx prisma migrate resolve --applied 0_init || true

            # --- validasi dulu di port sementara (8201), JANGAN sentuh v1 sebelum ini lolos ---
            export HOST_PORT=8201
            docker compose up -d
            ok=0
            for i in $(seq 1 15); do
              if curl -fsS "http://127.0.0.1:8201/api/health" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done
            docker compose down

            if [ "$ok" != "1" ]; then
              echo "v2 gagal sehat di port validasi, batal cutover - v1 tetap jalan" >&2
              docker compose logs --no-color --tail=100 || true
              exit 1
            fi

            # --- lolos validasi, baru cutover: matiin v1, naikin v2 di port 8200 ---
            unset HOST_PORT
            pm2 stop kok-badminton || true
            docker compose up -d

            ok=0
            for i in $(seq 1 15); do
              if curl -fsS "http://127.0.0.1:8200/api/health" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" != "1" ]; then
              echo "v2 gagal sehat di port 8200 setelah cutover, rollback ke v1" >&2
              docker compose logs --no-color --tail=100 || true
              docker compose down || true
              pm2 restart kok-badminton || pm2 start "$V1_DIR/server.js" --name kok-badminton --cwd "$V1_DIR"
              exit 1
            fi

            echo "Deploy v2 complete: $(git rev-parse --short HEAD) ($(date))"
