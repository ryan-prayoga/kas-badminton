<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kok Badminton — Admin</title>
  <link rel="stylesheet" href="/styles.css?v=10" />
  <script src="/vendor/iconify-icon.js?v=10"></script>
  <script src="/vendor/icons.js?v=10"></script>
</head>
<body class="text-ink50">

  <!-- ── Lockscreen ── -->
  <div id="lockScreen" class="grid min-h-[100dvh] content-center justify-items-center gap-5 px-6 pb-[calc(28px+var(--safe-b))] pt-[calc(28px+var(--safe-t))] text-center">
    <div class="grid h-14 w-14 place-items-center rounded-2xl bg-brand/15 text-brand ring-1 ring-brand/30">
      <iconify-icon icon="mdi:lock-outline" width="28"></iconify-icon>
    </div>
    <div id="lockClock" class="font-mono text-5xl font-light tracking-tight tabular-nums">--:--</div>
    <p class="text-sm text-muted">Masukkan PIN admin</p>
    <div id="lockDots" class="flex gap-3.5">
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
      <span class="dot h-3 w-3 rounded-full border-[1.5px] border-soft transition"></span>
    </div>
    <p id="lockError" class="min-h-[20px] text-sm text-danger">&nbsp;</p>
    <div id="lockKeypad" class="grid grid-cols-3 gap-4">
      <button type="button" data-key="1" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">1</button>
      <button type="button" data-key="2" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">2</button>
      <button type="button" data-key="3" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">3</button>
      <button type="button" data-key="4" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">4</button>
      <button type="button" data-key="5" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">5</button>
      <button type="button" data-key="6" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">6</button>
      <button type="button" data-key="7" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">7</button>
      <button type="button" data-key="8" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">8</button>
      <button type="button" data-key="9" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">9</button>
      <span></span>
      <button type="button" data-key="0" class="h-[72px] w-[72px] rounded-full border border-line bg-surface text-2xl font-medium transition active:scale-95 active:bg-elevated">0</button>
      <button type="button" data-key="back" aria-label="Hapus" class="grid h-[72px] w-[72px] place-items-center rounded-full border border-line bg-surface text-muted transition active:scale-95 active:bg-elevated"><iconify-icon icon="mdi:backspace-outline" width="24"></iconify-icon></button>
    </div>
    <a href="/" class="mt-2 inline-flex items-center gap-1 text-sm text-soft transition hover:text-muted">
      <iconify-icon icon="mdi:arrow-left" width="16"></iconify-icon> Halaman publik
    </a>
  </div>

  <!-- ── App ── -->
  <div id="appRoot" class="mx-auto flex w-full max-w-[720px] flex-col gap-4 px-4 pb-[calc(96px+var(--safe-b))] pt-[calc(16px+var(--safe-t))]" hidden>

    <!-- Header -->
    <header class="relative overflow-hidden rounded-xl2 border border-line bg-surface shadow-card">
      <div class="pointer-events-none absolute -right-8 -top-10 h-32 w-32 rounded-full bg-brand/20 blur-3xl"></div>
      <div class="relative p-4 sm:p-5">
        <div class="flex flex-wrap items-start justify-between gap-x-3 gap-y-2">
          <div class="flex min-w-0 items-center gap-2.5 sm:gap-3">
            <div class="grid h-10 w-10 shrink-0 place-items-center rounded-2xl bg-brand/15 text-brand ring-1 ring-brand/30 sm:h-11 sm:w-11">
              <iconify-icon icon="mdi:badminton" width="22"></iconify-icon>
            </div>
            <div class="min-w-0">
              <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-brand">Admin</p>
              <h1 class="truncate text-xl font-extrabold leading-tight tracking-tight sm:text-2xl">Kok Badminton</h1>
            </div>
          </div>
          <div class="ml-auto flex shrink-0 items-center gap-1 sm:gap-1.5">
            <button type="button" id="kokTypesBtn" title="Jenis kok" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50 sm:h-9 sm:w-9">
              <iconify-icon icon="game-icons:shuttlecock" width="16"></iconify-icon>
            </button>
            <button type="button" id="settingsBtn" title="Pengaturan" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50 sm:h-9 sm:w-9">
              <iconify-icon icon="mdi:cog" width="16"></iconify-icon>
            </button>
            <a href="/" title="Halaman publik" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50 sm:h-9 sm:w-9">
              <iconify-icon icon="mdi:earth" width="16"></iconify-icon>
            </a>
            <button type="button" id="logoutBtn" title="Kunci" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-danger sm:h-9 sm:w-9">
              <iconify-icon icon="mdi:lock-outline" width="16"></iconify-icon>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Belum bayar -->
    <details class="panel rounded-xl2 border border-line bg-surface shadow-card p-4" open>
      <summary class="mb-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:wallet-outline" width="20" class="text-warn"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Belum bayar</h2>
        </div>
        <div class="flex shrink-0 items-center gap-2">
          <p id="debtMeta" class="text-xs text-soft">—</p>
          <iconify-icon icon="mdi:chevron-down" width="18" class="debt-chevron text-soft"></iconify-icon>
        </div>
      </summary>
      <div id="debtList" class="grid grid-cols-1 gap-3"></div>
    </details>

    <!-- Riwayat -->
    <section class="rounded-xl2 border border-line bg-surface shadow-card p-4">
      <div class="mb-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:history" width="20" class="text-brand"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Riwayat</h2>
        </div>
        <p id="historyMeta" class="text-xs text-soft">—</p>
      </div>
      <div id="gameList" class="grid grid-cols-1 gap-3"></div>
    </section>
  </div>

  <!-- ── FAB: catat main baru ── -->
  <button type="button" id="fabAdd" aria-label="Catat main baru" hidden
    class="fixed bottom-[calc(20px+var(--safe-b))] right-4 z-40 grid h-14 w-14 place-items-center rounded-full bg-brand text-ink shadow-glow transition active:scale-90 hover:bg-brand-soft">
    <iconify-icon icon="mdi:plus" width="28"></iconify-icon>
  </button>

  <!-- ── Catat main dialog ── -->
  <dialog id="gameDialog">
    <form id="gameForm" class="grid grid-cols-1 max-h-[calc(100dvh-20px)] gap-4 overflow-auto rounded-xl2 border border-line bg-surface p-4 shadow-card">
      <div class="flex items-center gap-2">
        <iconify-icon icon="mdi:plus-circle-outline" width="20" class="text-brand"></iconify-icon>
        <h2 tabindex="-1" autofocus class="text-base font-bold tracking-tight outline-none">Catat main</h2>
      </div>

      <label class="grid gap-1.5">
        <span class="text-xs font-medium text-muted">Tanggal</span>
        <input id="date" type="date" required
          class="w-full rounded-xl border border-line bg-ink px-3 py-3 text-base outline-none transition focus:border-brand/60" />
      </label>

      <div id="pairInputs" class="grid grid-cols-1 gap-2.5">
        <!-- Pair A -->
        <div class="rounded-xl border border-line bg-elevated p-3" data-pair="a">
          <div class="mb-3 flex items-center justify-between gap-2">
            <span class="inline-flex items-center gap-1.5 rounded-md bg-brand/10 px-2 py-1 text-xs font-bold uppercase tracking-wide text-brand">Pair A</span>
            <div class="flex items-center gap-2">
              <span class="text-xs text-soft">Skor</span>
              <input type="text" inputmode="numeric" name="scoreA" placeholder="21" maxlength="20" autocomplete="off"
                class="w-16 rounded-lg border border-line bg-ink px-2 py-2 text-center font-mono text-base outline-none transition focus:border-brand/60" />
            </div>
          </div>
          <div class="grid gap-2 sm:grid-cols-2">
            <div class="relative">
              <input type="text" name="player0" data-role="player" placeholder="Pemain 1" autocomplete="off" required maxlength="40"
                class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
            </div>
            <div class="relative">
              <input type="text" name="player1" data-role="player" placeholder="Pemain 2" autocomplete="off" required maxlength="40"
                class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
            </div>
          </div>
        </div>

        <div class="grid place-items-center"><span class="grid h-7 w-7 place-items-center rounded-full border border-line bg-surface text-[10px] font-bold tracking-wider text-soft">VS</span></div>

        <!-- Pair B -->
        <div class="rounded-xl border border-line bg-elevated p-3" data-pair="b">
          <div class="mb-3 flex items-center justify-between gap-2">
            <span class="inline-flex items-center gap-1.5 rounded-md bg-ok/10 px-2 py-1 text-xs font-bold uppercase tracking-wide text-ok">Pair B</span>
            <div class="flex items-center gap-2">
              <span class="text-xs text-soft">Skor</span>
              <input type="text" inputmode="numeric" name="scoreB" placeholder="18" maxlength="20" autocomplete="off"
                class="w-16 rounded-lg border border-line bg-ink px-2 py-2 text-center font-mono text-base outline-none transition focus:border-brand/60" />
            </div>
          </div>
          <div class="grid gap-2 sm:grid-cols-2">
            <div class="relative">
              <input type="text" name="player2" data-role="player" placeholder="Pemain 1" autocomplete="off" required maxlength="40"
                class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
            </div>
            <div class="relative">
              <input type="text" name="player3" data-role="player" placeholder="Pemain 2" autocomplete="off" required maxlength="40"
                class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
            </div>
          </div>
        </div>
      </div>

      <div class="grid gap-2">
        <div class="flex items-center justify-between">
          <span class="text-xs font-medium text-muted">Kok (harga snapshot)</span>
          <button type="button" id="addKok" class="inline-flex items-center gap-1 rounded-lg border border-line bg-elevated px-2.5 py-1.5 text-xs font-medium transition active:scale-95 hover:border-line2">
            <iconify-icon icon="mdi:plus" width="14"></iconify-icon> Kok
          </button>
        </div>
        <div id="kokList" class="grid grid-cols-1 gap-2"></div>
        <p class="text-xs text-soft" id="formCostHint">—</p>
      </div>

      <label class="grid gap-1.5">
        <span class="text-xs font-medium text-muted">Catatan (opsional)</span>
        <input id="notes" type="text" placeholder="court 3, beli kok baru…" maxlength="160"
          class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
      </label>

      <div class="sticky bottom-0 -mx-4 -mb-4 flex items-center gap-2 border-t border-line bg-surface px-4 py-3">
        <button type="button" id="cancelGameForm" class="rounded-xl border border-line bg-elevated px-3 py-2.5 text-sm font-medium transition active:scale-95">Batal</button>
        <div class="flex-1"></div>
        <button type="submit" class="inline-flex items-center gap-1.5 rounded-xl bg-brand px-4 py-2.5 text-sm font-bold text-ink transition active:scale-95 hover:bg-brand-soft">
          <iconify-icon icon="mdi:content-save-check-outline" width="16"></iconify-icon> Simpan game
        </button>
      </div>
    </form>
  </dialog>

  <!-- ── Pengaturan dialog ── -->
  <dialog id="settingsDialog">
    <form id="settingsForm" class="grid grid-cols-1 gap-4 rounded-xl2 border border-line bg-surface p-4 shadow-card">
      <div class="flex items-center gap-2">
        <iconify-icon icon="mdi:cog" width="20" class="text-brand"></iconify-icon>
        <h2 class="text-base font-bold tracking-tight">Pengaturan</h2>
      </div>

      <label class="grid gap-1.5">
        <span class="text-xs font-medium text-muted">Default harga / orang / kok</span>
        <div class="flex items-center gap-2 rounded-xl border border-line bg-ink px-3">
          <span class="font-mono text-sm text-soft">Rp</span>
          <input id="defaultPrice" inputmode="numeric" type="number" min="0" step="500"
            class="min-w-0 flex-1 bg-transparent py-2.5 text-base outline-none" />
        </div>
        <p class="text-xs text-soft">Dipakai kalau kok belum pilih jenis. Harga di game tetap snapshot.</p>
      </label>

      <div class="flex items-center gap-2 border-t border-line pt-3">
        <button type="button" id="cancelSettings" class="rounded-xl border border-line bg-elevated px-3 py-2.5 text-sm font-medium transition active:scale-95">Tutup</button>
        <div class="flex-1"></div>
        <button type="submit" class="inline-flex items-center gap-1.5 rounded-xl bg-brand px-4 py-2.5 text-sm font-bold text-ink transition active:scale-95 hover:bg-brand-soft">
          <iconify-icon icon="mdi:content-save-outline" width="16"></iconify-icon> Simpan
        </button>
      </div>
    </form>
  </dialog>

  <!-- ── Jenis kok dialog ── -->
  <dialog id="kokTypesDialog">
    <div class="grid grid-cols-1 max-h-[calc(100dvh-20px)] w-[min(100vw-2rem,420px)] gap-4 overflow-auto rounded-xl2 border border-line bg-surface p-4 shadow-card">
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="game-icons:shuttlecock" width="20" class="text-brand"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Jenis kok</h2>
        </div>
        <button type="button" id="closeKokTypes" class="grid h-9 w-9 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50">
          <iconify-icon icon="mdi:close" width="18"></iconify-icon>
        </button>
      </div>
      <p class="text-xs text-soft">Katalog + stok. Saat catat main pilih jenis — stok otomatis berkurang, harga di-snapshot.</p>

      <form id="kokTypeForm" class="grid grid-cols-1 gap-2 rounded-xl border border-line bg-elevated p-3">
        <input type="hidden" id="kokTypeEditId" value="" />
        <label class="grid gap-1">
          <span class="text-xs font-medium text-muted">Nama</span>
          <input id="kokTypeName" type="text" required maxlength="60" placeholder="Yonex Aerosensa 50"
            class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
        </label>
        <div class="grid grid-cols-2 gap-2">
          <label class="grid gap-1">
            <span class="text-xs font-medium text-muted">Harga / orang</span>
            <div class="flex items-center gap-2 rounded-xl border border-line bg-ink px-3">
              <span class="font-mono text-sm text-soft">Rp</span>
              <input id="kokTypePrice" inputmode="numeric" type="number" min="0" step="500" required
                class="min-w-0 flex-1 bg-transparent py-2.5 text-base outline-none" />
            </div>
          </label>
          <label class="grid gap-1">
            <span class="text-xs font-medium text-muted">Stok</span>
            <input id="kokTypeStock" inputmode="numeric" type="number" min="0" step="1" value="0" required
              class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
          </label>
        </div>
        <div class="flex items-center gap-2 pt-1">
          <button type="button" id="kokTypeFormCancel" class="rounded-xl border border-line bg-surface px-3 py-2 text-sm font-medium transition active:scale-95" hidden>Batal edit</button>
          <div class="flex-1"></div>
          <button type="submit" id="kokTypeFormSubmit" class="inline-flex items-center gap-1.5 rounded-xl bg-brand px-3.5 py-2 text-sm font-bold text-ink transition active:scale-95 hover:bg-brand-soft">
            <iconify-icon icon="mdi:plus" width="16"></iconify-icon> Tambah
          </button>
        </div>
      </form>

      <div id="kokTypeList" class="grid grid-cols-1 gap-2"></div>
    </div>
  </dialog>

  <!-- ── Edit dialog ── -->
  <dialog id="editDialog">
    <form method="dialog" id="editForm" class="grid grid-cols-1 max-h-[calc(100dvh-20px)] gap-3 overflow-auto rounded-xl2 border border-line bg-surface p-4 shadow-card">
      <div class="flex items-center gap-2">
        <iconify-icon icon="mdi:pencil-outline" width="20" class="text-brand"></iconify-icon>
        <h2 tabindex="-1" autofocus class="text-base font-bold tracking-tight outline-none">Edit game</h2>
      </div>
      <input type="hidden" id="editId" />

      <label class="grid gap-1.5">
        <span class="text-xs font-medium text-muted">Tanggal</span>
        <input id="editDate" type="date" required
          class="w-full rounded-xl border border-line bg-ink px-3 py-3 text-base outline-none transition focus:border-brand/60" />
      </label>

      <div class="grid grid-cols-1 gap-2.5" id="editPairs"></div>
      <div id="editKoks" class="grid grid-cols-1 gap-2"></div>

      <label class="grid gap-1.5">
        <span class="text-xs font-medium text-muted">Catatan</span>
        <input id="editNotes" type="text" maxlength="160"
          class="w-full rounded-xl border border-line bg-ink px-3 py-2.5 text-base outline-none transition focus:border-brand/60" />
      </label>

      <div class="sticky bottom-0 -mx-4 -mb-4 flex items-center gap-2 border-t border-line bg-surface px-4 py-3">
        <button type="button" id="deleteGame" class="inline-flex items-center gap-1.5 rounded-xl border border-danger/40 bg-danger/10 px-3 py-2.5 text-sm font-medium text-danger transition active:scale-95">
          <iconify-icon icon="mdi:trash-can-outline" width="16"></iconify-icon> Hapus
        </button>
        <div class="flex-1"></div>
        <button type="button" id="cancelEdit" class="rounded-xl border border-line bg-elevated px-3 py-2.5 text-sm font-medium transition active:scale-95">Batal</button>
        <button type="submit" class="inline-flex items-center gap-1.5 rounded-xl bg-brand px-4 py-2.5 text-sm font-bold text-ink transition active:scale-95 hover:bg-brand-soft">
          <iconify-icon icon="mdi:check" width="16"></iconify-icon> Simpan
        </button>
      </div>
    </form>
  </dialog>

  <!-- ── Konfirmasi dialog (generik) ── -->
  <dialog id="confirmDialog">
    <div class="grid grid-cols-1 max-w-[360px] gap-4 rounded-xl2 border border-line bg-surface p-4 shadow-card">
      <div class="flex items-start gap-2.5">
        <iconify-icon icon="mdi:alert-circle-outline" width="22" class="mt-0.5 shrink-0 text-warn"></iconify-icon>
        <p id="confirmMessage" class="text-sm text-ink50">Yakin?</p>
      </div>
      <div class="flex items-center gap-2">
        <button type="button" id="confirmCancel" class="flex-1 rounded-xl border border-line bg-elevated px-3 py-2.5 text-sm font-medium transition active:scale-95">Batal</button>
        <button type="button" id="confirmOk" class="flex-1 rounded-xl border border-danger/40 bg-danger/10 px-3 py-2.5 text-sm font-bold text-danger transition active:scale-95">Ya, lanjut</button>
      </div>
    </div>
  </dialog>

  <!-- ── Toast stack ── -->
  <div id="toastStack" class="pointer-events-none fixed inset-x-0 bottom-[calc(16px+var(--safe-b))] z-50 mx-auto flex w-full max-w-[720px] flex-col items-stretch gap-2 px-4"></div>

  <script src="/admin/app.js?v=10"></script>
</body>
</html>
