<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kok Badminton</title>
  <link rel="icon" href="/favicon.svg?v=15" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css?v=20" />
  <script src="/vendor/iconify-icon.js?v=15"></script>
  <script src="/vendor/icons.js?v=16"></script>
</head>
<body class="text-ink50">
  <div class="mx-auto flex w-full max-w-[720px] flex-col gap-4 px-4 pb-[calc(96px+var(--safe-b))] pt-[calc(16px+var(--safe-t))]">

    <!-- Header / hero -->
    <header class="relative overflow-hidden rounded-xl2 border border-line bg-surface shadow-card">
      <div class="pointer-events-none absolute -right-8 -top-10 h-32 w-32 rounded-full bg-brand/20 blur-3xl"></div>
      <div class="relative p-4 sm:p-5">
        <div class="flex flex-wrap items-start justify-between gap-x-3 gap-y-2">
          <div class="flex min-w-0 items-center gap-2.5 sm:gap-3">
            <div class="grid h-10 w-10 shrink-0 place-items-center rounded-2xl bg-brand/15 text-brand ring-1 ring-brand/30 sm:h-11 sm:w-11">
              <iconify-icon icon="mdi:badminton" width="22"></iconify-icon>
            </div>
            <div class="min-w-0">
              <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-soft">Kas · Read-only</p>
              <h1 class="truncate text-xl font-extrabold leading-tight tracking-tight sm:text-2xl">Kok Badminton</h1>
            </div>
          </div>
          <div class="ml-auto flex shrink-0 items-center gap-1.5">
            <button type="button" id="refreshBtn" title="Refresh" aria-label="Refresh" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50 focus-visible:ring-2 focus-visible:ring-brand/60 sm:h-9 sm:w-9">
              <iconify-icon icon="mdi:refresh" width="16"></iconify-icon>
            </button>
            <a href="/admin" class="inline-flex shrink-0 items-center gap-1.5 rounded-xl border border-line bg-elevated px-2.5 py-2 text-sm font-medium text-muted transition active:scale-95 hover:text-ink50 hover:border-line2 focus-visible:ring-2 focus-visible:ring-brand/60">
              <iconify-icon icon="mdi:shield-account-outline" width="16"></iconify-icon>
              Admin
            </a>
          </div>
        </div>
        <p id="lastUpdated" class="mt-3 text-xs text-soft">Memuat…</p>
      </div>
    </header>

    <!-- ── Tab: Riwayat ── -->
    <section data-panel="riwayat" class="rounded-xl2 border border-line bg-surface shadow-card p-4">
      <div class="mb-3">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:history" width="20" class="text-brand"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Riwayat</h2>
        </div>
        <div class="mt-2.5 flex items-center justify-between gap-2">
          <span id="historyMeta" class="inline-flex items-center gap-1 rounded-full bg-brand/15 px-2 py-0.5 text-[11px] font-semibold text-brand">—</span>
          <label class="flex shrink-0 items-center gap-1.5 rounded-lg border border-line bg-elevated px-2.5 py-1.5 text-xs font-medium text-muted transition focus-within:border-brand/60">
            <iconify-icon icon="mdi:calendar-month-outline" width="14" class="text-soft"></iconify-icon>
            <select class="periodFilter min-w-0 bg-transparent text-ink50 outline-none" aria-label="Filter periode"></select>
          </label>
        </div>
      </div>
      <div id="gameList" class="grid grid-cols-1 gap-3">
        <div class="grid place-items-center gap-1 rounded-xl border border-dashed border-line bg-sunken py-6 text-soft">
          <iconify-icon icon="svg-spinners:180-ring" width="22"></iconify-icon>
          <span class="text-sm">Memuat…</span>
        </div>
      </div>
    </section>

    <!-- ── Tab: Belum bayar ── -->
    <section data-panel="bayar" hidden class="rounded-xl2 border border-line bg-surface shadow-card p-4">
      <div class="mb-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:wallet-outline" width="20" class="text-warn"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Belum bayar</h2>
        </div>
        <div class="flex shrink-0 items-center gap-2">
          <p id="debtMeta" class="flex items-center gap-1 text-xs text-soft">—</p>
          <button type="button" id="shareAllBtn" title="Share semua tagihan" class="grid h-8 w-8 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50 focus-visible:ring-2 focus-visible:ring-brand/60">
            <iconify-icon icon="mdi:share-variant-outline" width="16"></iconify-icon>
          </button>
        </div>
      </div>
      <div id="debtList" class="grid grid-cols-1 gap-3">
        <div class="grid place-items-center gap-1 rounded-xl border border-dashed border-line bg-sunken py-6 text-soft">
          <iconify-icon icon="svg-spinners:180-ring" width="22"></iconify-icon>
          <span class="text-sm">Memuat…</span>
        </div>
      </div>
    </section>

    <!-- ── Tab: Statistik ── -->
    <section data-panel="statistik" hidden class="flex flex-col gap-4">
      <div class="flex items-center justify-end">
        <label class="flex items-center gap-1.5 rounded-lg border border-line bg-elevated px-2.5 py-1.5 text-xs font-medium text-muted transition focus-within:border-brand/60">
          <iconify-icon icon="mdi:calendar-month-outline" width="14" class="text-soft"></iconify-icon>
          <select class="periodFilter min-w-0 bg-transparent text-ink50 outline-none" aria-label="Filter periode"></select>
        </label>
      </div>
      <div id="statStrip" class="grid grid-cols-2 gap-3"></div>
      <div class="rounded-xl2 border border-line bg-surface shadow-card p-4">
        <div class="mb-3 flex items-center gap-2">
          <iconify-icon icon="mdi:trophy-outline" width="20" class="text-brand"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Statistik pemain</h2>
        </div>
        <div id="statPlayers" class="grid grid-cols-1 gap-2"></div>
      </div>
    </section>

    <footer class="pb-2 pt-1 text-center text-xs text-soft">
      Kok Badminton · pencatatan kas patungan
    </footer>
  </div>

  <!-- ── Bottom navbar ── -->
  <nav id="bottomNav" class="fixed inset-x-0 bottom-0 z-40 border-t border-line bg-surface/95 backdrop-blur">
    <div class="mx-auto flex w-full max-w-[720px] items-stretch pb-[var(--safe-b)]">
      <button type="button" class="navitem" data-tab="riwayat" aria-label="Riwayat">
        <iconify-icon icon="mdi:history" width="22"></iconify-icon><span>Riwayat</span>
      </button>
      <button type="button" class="navitem" data-tab="bayar" aria-label="Belum bayar">
        <iconify-icon icon="mdi:wallet-outline" width="22"></iconify-icon><span>Bayar</span>
      </button>
      <button type="button" class="navitem" data-tab="statistik" aria-label="Statistik">
        <iconify-icon icon="mdi:chart-box-outline" width="22"></iconify-icon><span>Statistik</span>
      </button>
    </div>
  </nav>

  <!-- ── Toast stack ── -->
  <div id="toastStack" class="pointer-events-none fixed inset-x-0 bottom-[calc(84px+var(--safe-b))] z-50 mx-auto flex w-full max-w-[720px] flex-col items-stretch gap-2 px-4"></div>

  <script src="/public.js?v=20"></script>
</body>
</html>
