<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kok Badminton</title>
  <link rel="stylesheet" href="/styles.css?v=4" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <p class="eyebrow">Kas</p>
        <h1>Kok Badminton</h1>
      </div>
      <div class="price-box">
        <p class="public-note">Lihat riwayat main &amp; siapa yang belum bayar.</p>
        <a href="/admin" class="btn ghost full">Login admin</a>
      </div>
    </header>

    <section class="panel" id="debtPanel">
      <div class="panel-head">
        <h2>Belum bayar</h2>
        <p id="debtMeta">—</p>
      </div>
      <div id="debtList" class="debt-list empty-state">Memuat…</div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Riwayat</h2>
        <p id="historyMeta">—</p>
      </div>
      <div id="gameList" class="game-list empty-state">Memuat…</div>
    </section>
  </div>

  <script src="/public.js?v=4"></script>
</body>
</html>
