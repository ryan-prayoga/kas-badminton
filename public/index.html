<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kok Badminton</title>
  <link rel="stylesheet" href="/styles.css?v=7" />
  <script src="/vendor/iconify-icon.js?v=7"></script>
  <script src="/vendor/icons.js?v=7"></script>
</head>
<body class="text-ink50">
  <div class="mx-auto flex w-full max-w-[720px] flex-col gap-4 px-4 pb-[calc(40px+var(--safe-b))] pt-[calc(16px+var(--safe-t))]">

    <!-- Header / hero -->
    <header class="relative overflow-hidden rounded-xl2 border border-line bg-surface shadow-card">
      <div class="pointer-events-none absolute -right-8 -top-10 h-32 w-32 rounded-full bg-brand/20 blur-3xl"></div>
      <div class="relative p-4 sm:p-5">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-brand/15 text-brand ring-1 ring-brand/30">
              <iconify-icon icon="mdi:badminton" width="24"></iconify-icon>
            </div>
            <div>
              <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-soft">Kas · Read-only</p>
              <h1 class="text-2xl font-extrabold leading-tight tracking-tight">Kok Badminton</h1>
            </div>
          </div>
          <div class="flex shrink-0 items-center gap-1.5">
            <button type="button" id="refreshBtn" title="Refresh" aria-label="Refresh" class="grid h-9 w-9 place-items-center rounded-xl border border-line bg-elevated text-muted transition active:scale-95 hover:text-ink50">
              <iconify-icon icon="mdi:refresh" width="18"></iconify-icon>
            </button>
            <a href="/admin" class="inline-flex shrink-0 items-center gap-1.5 rounded-xl border border-line bg-elevated px-3 py-2 text-sm font-medium text-muted transition active:scale-95 hover:text-ink50 hover:border-line2">
              <iconify-icon icon="mdi:shield-account-outline" width="18"></iconify-icon>
              Admin
            </a>
          </div>
        </div>
        <p class="mt-3 text-sm text-muted">Lihat riwayat main &amp; siapa yang belum bayar.</p>
        <p id="lastUpdated" class="mt-1 text-xs text-soft">Memuat…</p>
      </div>
    </header>

    <!-- Stat strip -->
    <section id="statStrip" class="grid grid-cols-2 gap-3"></section>

    <!-- Belum bayar -->
    <section class="rounded-xl2 border border-line bg-surface shadow-card p-4">
      <div class="mb-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:wallet-outline" width="20" class="text-warn"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Belum bayar</h2>
        </div>
        <p id="debtMeta" class="text-xs text-soft">—</p>
      </div>
      <div id="debtList" class="grid gap-3">
        <div class="grid place-items-center gap-1 rounded-xl border border-dashed border-line bg-sunken py-6 text-soft">
          <iconify-icon icon="svg-spinners:180-ring" width="22"></iconify-icon>
          <span class="text-sm">Memuat…</span>
        </div>
      </div>
    </section>

    <!-- Riwayat -->
    <section class="rounded-xl2 border border-line bg-surface shadow-card p-4">
      <div class="mb-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <iconify-icon icon="mdi:history" width="20" class="text-brand"></iconify-icon>
          <h2 class="text-base font-bold tracking-tight">Riwayat</h2>
        </div>
        <p id="historyMeta" class="text-xs text-soft">—</p>
      </div>
      <div id="gameList" class="grid gap-3">
        <div class="grid place-items-center gap-1 rounded-xl border border-dashed border-line bg-sunken py-6 text-soft">
          <iconify-icon icon="svg-spinners:180-ring" width="22"></iconify-icon>
          <span class="text-sm">Memuat…</span>
        </div>
      </div>
    </section>

    <footer class="pb-2 pt-1 text-center text-xs text-soft">
      Kok Badminton · pencatatan kas patungan
    </footer>
  </div>

  <script src="/public.js?v=7"></script>
</body>
</html>
